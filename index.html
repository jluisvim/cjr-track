<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Conferencias Académicas</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: #f8f9fa;
            padding: 2rem 1rem;
            color: #1a1a2e;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Header */
        h1 {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 0.25rem;
        }

        .subtitle {
            color: #6c757d;
            font-size: 0.875rem;
            margin-bottom: 1.5rem;
        }

        /* Filtros - minimalistas */
        .filters {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .filter-group {
            display: flex;
            gap: 0.5rem;
            background: white;
            padding: 0.25rem;
            border-radius: 8px;
            border: 1px solid #dee2e6;
        }

        .filter-btn {
            padding: 0.375rem 0.875rem;
            font-size: 0.8rem;
            background: transparent;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 500;
        }

        .filter-btn.active {
            background: #1a1a2e;
            color: white;
        }

        .filter-btn:hover:not(.active) {
            background: #e9ecef;
        }

        .search-box {
            padding: 0.375rem 0.875rem;
            font-size: 0.8rem;
            border: 1px solid #dee2e6;
            border-radius: 8px;
            width: 250px;
            font-family: inherit;
        }

        .stats {
            font-size: 0.75rem;
            color: #6c757d;
            margin-bottom: 0.75rem;
        }

        /* Tabla - minimalista */
        .table-wrapper {
            overflow-x: auto;
            background: white;
            border-radius: 12px;
            border: 1px solid #e9ecef;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.8rem;
        }

        th {
            text-align: left;
            padding: 0.875rem 0.75rem;
            background: #f8f9fa;
            font-weight: 600;
            border-bottom: 1px solid #dee2e6;
            color: #495057;
        }

        td {
            padding: 0.75rem;
            border-bottom: 1px solid #f0f0f0;
            vertical-align: middle;
        }

        tr:hover {
            background: #f8f9fa;
        }

        /* Enlaces */
        a {
            color: #1a1a2e;
            text-decoration: none;
            font-weight: 500;
        }

        a:hover {
            text-decoration: underline;
        }

        /* Badges de estado */
        .badge {
            display: inline-block;
            padding: 0.25rem 0.5rem;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 500;
            white-space: nowrap;
        }

        .badge-open {
            background: #e8f5e9;
            color: #2e7d32;
        }

        .badge-closing {
            background: #fff3e0;
            color: #e65100;
        }

        .badge-closed {
            background: #eceff1;
            color: #546e7a;
        }

        /* Alertas de fechas */
        .deadline-urgent {
            color: #c62828;
            font-weight: 600;
        }

        .deadline-warning {
            color: #e65100;
        }

        .deadline-safe {
            color: #2e7d32;
        }

        /* Keywords */
        .keywords {
            display: flex;
            flex-wrap: wrap;
            gap: 0.25rem;
        }

        .keyword {
            background: #e9ecef;
            padding: 0.125rem 0.5rem;
            border-radius: 12px;
            font-size: 0.7rem;
            white-space: nowrap;
        }

        /* Sin resultados */
        .no-results {
            text-align: center;
            padding: 3rem;
            color: #6c757d;
        }

        /* Responsive */
        @media (max-width: 768px) {
            body {
                padding: 1rem;
            }
            
            th, td {
                padding: 0.5rem;
            }
            
            .filters {
                flex-direction: column;
                align-items: stretch;
            }
            
            .search-box {
                width: 100%;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <h1>📋 Conferencias Académicas</h1>
    <div class="subtitle">Seguimiento de fechas límite para envío de trabajos</div>

    <div class="filters">
        <div class="filter-group">
            <button class="filter-btn active" onclick="filterByStatus('all')">Todas</button>
            <button class="filter-btn" onclick="filterByStatus('open')">Abiertas</button>
            <button class="filter-btn" onclick="filterByStatus('closing-soon')">Cierre próximo</button>
        </div>
        <input type="text" id="searchInput" class="search-box" placeholder="Buscar por título, keyword o ubicación..." onkeyup="filterTable()">
    </div>

    <div class="stats" id="stats"></div>

    <div class="table-wrapper">
        <table id="conferencesTable">
            <thead>
                <tr>
                    <th>Título</th>
                    <th>Ubicación</th>
                    <th>Estado</th>
                    <th>Sumisión</th>
                    <th>Abstract</th>
                    <th>Keywords</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                <tr><td colspan="6" class="no-results">Cargando...</td></tr>
            </tbody>
        </table>
    </div>
</div>

<script>
    // ⚠️ REEMPLAZA con tu URL de Apps Script
        const API_URL = 'https://script.google.com/macros/s/AKfycbzYjLvISkl7pguM3zcq8oUZa_sMxqfDiCJo4rdPVUbjVz3LyaZG6ipim9Cx8PNoBCh5/exec';
    
    let allConferences = [];
    let currentStatus = 'all';
    let currentSearch = '';

    function formatDate(dateString) {
        if (!dateString) return '—';
        const date = new Date(dateString);
        return date.toLocaleDateString('es-ES', { day: '2-digit', month: '2-digit', year: 'numeric' });
    }

    function getDaysUntil(targetDate) {
        if (!targetDate) return null;
        const today = new Date();
        today.setHours(0, 0, 0, 0);
        const target = new Date(targetDate);
        target.setHours(0, 0, 0, 0);
        const diff = Math.ceil((target - today) / (1000 * 60 * 60 * 24));
        return diff;
    }

    function formatDeadlineCell(dateString) {
        if (!dateString) return '<span style="color:#adb5bd;">—</span>';
        
        const days = getDaysUntil(dateString);
        const formattedDate = formatDate(dateString);
        
        if (days < 0) {
            return `<span style="color:#adb5bd;">${formattedDate}<br><span style="font-size:0.7rem;">(cerrada)</span></span>`;
        }
        if (days === 0) {
            return `<span class="deadline-urgent">${formattedDate}<br><span style="font-size:0.7rem;">¡HOY!</span></span>`;
        }
        if (days <= 3) {
            return `<span class="deadline-urgent">${formattedDate}<br><span style="font-size:0.7rem;">${days} días</span></span>`;
        }
        if (days <= 14) {
            return `<span class="deadline-warning">${formattedDate}<br><span style="font-size:0.7rem;">${days} días</span></span>`;
        }
        return `<span class="deadline-safe">${formattedDate}<br><span style="font-size:0.7rem;">${days} días</span></span>`;
    }

    function getStatusBadge(status) {
        if (status === 'open') return '<span class="badge badge-open">Abierta</span>';
        if (status === 'closing-soon') return '<span class="badge badge-closing">Cierra pronto</span>';
        return '<span class="badge badge-closed">Cerrada</span>';
    }

    function renderTable() {
        let filtered = allConferences;
        
        // Filtrar por estado
        if (currentStatus !== 'all') {
            filtered = filtered.filter(c => c.status === currentStatus);
        }
        
        // Filtrar por búsqueda
        if (currentSearch) {
            const searchLower = currentSearch.toLowerCase();
            filtered = filtered.filter(c => 
                (c.Titulo && c.Titulo.toLowerCase().includes(searchLower)) ||
                (c.PalabrasClave && c.PalabrasClave.toLowerCase().includes(searchLower)) ||
                (c.Ubicacion && c.Ubicacion.toLowerCase().includes(searchLower)) ||
                (c.Pais && c.Pais.toLowerCase().includes(searchLower))
            );
        }
        
        // Actualizar estadísticas
        const openCount = filtered.filter(c => c.status === 'open').length;
        const closingCount = filtered.filter(c => c.status === 'closing-soon').length;
        document.getElementById('stats').innerHTML = `📊 ${filtered.length} conferencias | Abiertas: ${openCount} | Cierre próximo: ${closingCount}`;
        
        if (filtered.length === 0) {
            document.getElementById('tableBody').innerHTML = '<tr><td colspan="6" class="no-results">No hay conferencias con esos criterios</td></tr>';
            return;
        }
        
        let html = '';
        for (const conf of filtered) {
            html += `
                <tr>
                    <td style="font-weight:500;">
                        ${conf.Link ? `<a href="${conf.Link}" target="_blank">${conf.Titulo || 'Sin título'}</a>` : (conf.Titulo || 'Sin título')}
                    </td>
                    <td>
                        ${conf.Ubicacion || '—'}${conf.Modalidad ? `<br><span style="font-size:0.7rem;color:#6c757d;">${conf.Modalidad}</span>` : ''}
                    </td>
                    <td>${getStatusBadge(conf.status)}</td>
                    <td>${formatDeadlineCell(conf.FechaSumision)}</td>
                    <td>${conf.FechaAbstracto ? formatDeadlineCell(conf.FechaAbstracto) : '<span style="color:#adb5bd;">—</span>'}</td>
                    <td>
                        ${conf.keywordsArray && conf.keywordsArray.length > 0 ? 
                            `<div class="keywords">${conf.keywordsArray.slice(0, 3).map(kw => `<span class="keyword">${kw}</span>`).join('')}${conf.keywordsArray.length > 3 ? `<span class="keyword">+${conf.keywordsArray.length - 3}</span>` : ''}</div>` : 
                            '<span style="color:#adb5bd;">—</span>'
                        }
                    </td>
                </tr>
            `;
        }
        document.getElementById('tableBody').innerHTML = html;
    }

    function filterByStatus(status) {
        currentStatus = status;
        renderTable();
        
        // Actualizar botón activo
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.classList.remove('active');
            if (btn.textContent.trim().toLowerCase() === (status === 'all' ? 'todas' : (status === 'open' ? 'abiertas' : 'cierre próximo'))) {
                btn.classList.add('active');
            }
        });
    }

    function filterTable() {
        currentSearch = document.getElementById('searchInput').value;
        renderTable();
    }

    async function loadConferences() {
        try {
            const response = await fetch(API_URL);
            allConferences = await response.json();
            renderTable();
        } catch (error) {
            console.error('Error:', error);
            document.getElementById('tableBody').innerHTML = '<tr><td colspan="6" class="no-results">❌ Error al cargar datos. Verifica la URL del API.</td></tr>';
        }
    }

    loadConferences();
    setInterval(loadConferences, 3600000); // Actualizar cada hora
</script>
</body>
</html>
